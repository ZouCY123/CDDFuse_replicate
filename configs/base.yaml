# ================================================================
# base.yaml — 所有实验的默认参数
#
# 子配置只需写与这里不同的字段，其余自动继承。
# 例如 configs/baseline/cddfuse_ivf.yaml 只需写：
#   _base_: "../base.yaml"
#   experiment:
#     name: "cddfuse_ivf"
# ================================================================
 
 
# ----------------------------------------------------------------
# 实验基本信息
# ----------------------------------------------------------------
experiment:
  name: "cddfuse_base"     # 实验名，输出目录会用这个命名
  seed: 42                 # 随机种子，保证可复现
  task: "IVF"              # 任务类型：IVF（红外可见光融合）或 MIF（医学图像融合）
 
 
# ----------------------------------------------------------------
# 数据配置
# ----------------------------------------------------------------
data:
  # 原始训练图像目录（preprocess.py 的输入）
  ir_dir:  "/home/zcy/papersWithCode/02_CDDFuse_CVPR_2023/CDDFuse_replicate/data/MSRS/train/ir"
  vis_dir: "/home/zcy/papersWithCode/02_CDDFuse_CVPR_2023/CDDFuse_replicate/data/MSRS/train/vi"

  # 预处理输出的 .h5 文件（dataset.py 的输入）
  processed_h5: "/home/zcy/papersWithCode/02_CDDFuse_CVPR_2023/CDDFuse_replicate/data/processed/MSRS_imgsize_128_stride_200.h5"
 
  # patch 参数（影响 .h5 文件大小和训练数据量）
  patch_size: 128   # patch 边长，原论文用 128
  stride:     200   # 滑动步长，200 > 128 表示 patch 之间没有重叠
 
  # 测试集列表（test.py 遍历这里的每个数据集）
  test_dirs:
      - name: "MSRS"
        ir: "data/MSRS/test/ir"
        vi: "data/MSRS/test/vi"
    # - name: "TNO"
    #   ir: "data/test/TNO/ir"
    #   vi: "data/test/TNO/vi"
    # - name: "RoadScene"
    #   ir: "data/test/RoadScene/ir"
    #   vi: "data/test/RoadScene/vi"
 
 
# ----------------------------------------------------------------
# 模型结构
# ----------------------------------------------------------------
model:
  name: "CDDFuse"          # 对应 src/models/ 下的类，方便后续切换
 
  # Restormer Encoder / Decoder 共用参数
  inp_channels: 1          # 输入通道数，灰度图为 1
  out_channels: 1          # 输出通道数
  dim: 64                  # 特征维度（通道数）
 
  # 每个阶段的 TransformerBlock 数量
  # [浅层 Encoder, Decoder]
  num_blocks: [4, 4]
 
  # 各阶段的注意力头数
  # [Encoder 浅层, Decoder, Base 分支]
  heads: [8, 8, 8]
 
  ffn_expansion_factor: 2  # FeedForward 隐层扩张比
  bias: false              # 卷积是否使用 bias
  LayerNorm_type: "WithBias"
 
  # Detail 分支（INN）的耦合层数量
  # 测试时用 1，训练时用 3
  detail_num_layers: 3
 
 
# ----------------------------------------------------------------
# 训练超参
# ----------------------------------------------------------------
train:
  num_epochs: 120          # 总训练轮数
  epoch_gap:  40           # Phase I 结束的 epoch（0 ~ epoch_gap-1 是 Phase I）
 
  batch_size: 8
  lr:           1.0e-4     # 初始学习率
  weight_decay: 0          # Adam 的 L2 正则
 
  # 梯度裁剪（防止梯度爆炸）
  clip_grad_norm: 0.01
 
  # StepLR 调度器：每 optim_step 个 epoch，lr × optim_gamma
  optim_step:  20
  optim_gamma: 0.5
 
  # ── 损失函数权重 ──────────────────────────────────────────
  # Phase I
  coeff_mse_vis: 1.0       # VIS 重建损失权重
  coeff_mse_ir:  1.0       # IR  重建损失权重
  coeff_decomp:  2.0       # 特征分解损失权重（Phase I 和 II 都用）
  coeff_tv:      5.0       # 梯度平滑损失权重（Phase I）
 
  # Phase II（fusion_loss 内部已经包含 intensity + gradient，这里不再单独配）
 
 
# ----------------------------------------------------------------
# 日志与 checkpoint
# ----------------------------------------------------------------
logging:
  tensorboard: true        # 是否开启 TensorBoard
  save_freq:   10          # 每隔多少 epoch 保存一次 checkpoint
  keep_last_n: 3           # 只保留最近 N 个 epoch_*.pth（节省磁盘）
                           # best.pth 始终保留，不受此限制